name: Deploy to GitHub Packages

on:
  push:
    branches: [ main, develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Create Custom Maven Settings
      run: |
        mkdir -p ~/.m2
        echo "<settings><servers><server><id>jpsonic-packages-repo</id><username>${{ github.actor }}</username><password>${{ secrets.JPSONIC_PACKAGE_TOKEN }}</password></server></servers></settings>" > ~/.m2/settings.xml
    - name: Publish to GitHub Packages
      run: mvn --batch-mode clean deploy
